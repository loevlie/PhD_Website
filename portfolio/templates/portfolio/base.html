{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ hero.name }} — {{ hero.title }}</title>
    <meta name="description" content="{{ hero.name }}, {{ hero.title }} at {{ hero.affiliation }}. Research in multimodal tabular foundation models.">

    <!-- Open Graph / social sharing -->
    <meta property="og:title" content="{{ hero.name }} — {{ hero.title }}">
    <meta property="og:description" content="{{ hero.title }} at {{ hero.affiliation }}. Research in multimodal tabular foundation models.">
    <meta property="og:image" content="{% static 'portfolio/images/og-cover.png' %}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ hero.name }} — {{ hero.title }}">
    <meta name="twitter:description" content="{{ hero.title }} at {{ hero.affiliation }}. Research in multimodal tabular foundation models.">
    <meta name="twitter:image" content="{% static 'portfolio/images/og-cover.png' %}">

    <!-- Three.js import map -->
    <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Theme: apply before CSS paints to prevent flash -->
    <script>
        (function() {
            var mobile = window.matchMedia('(max-width: 768px)').matches;
            if (mobile) return;
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <style>
        /* Hide the wrong icon before page renders — JS takes over after load */
        .icon-sun { display: none !important; }
        html.light-mode .icon-moon { display: none !important; }
        html.light-mode .icon-sun { display: block !important; }
    </style>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'portfolio/css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/components.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/sections.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/animations.css' %}">
    <link rel="stylesheet" href="{% static 'portfolio/css/responsive.css' %}">
</head>
<body>
    <div class="scroll-progress" id="scroll-progress"></div>

    {% block content %}{% endblock %}

    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 {{ hero.name }}</p>
        </div>
    </footer>

    <script src="{% static 'portfolio/js/theme.js' %}"></script>
    <script src="{% static 'portfolio/js/particles.js' %}"></script>
    <script>
    // Avatar video: play once, auto-flip to real photo, toggle on each hover
    (function() {
        var v = document.querySelector('.avatar-video');
        var container = document.querySelector('.avatar-flip-container');
        if (!v || !container) return;
        if (window.matchMedia('(max-width: 768px)').matches) {
            v.removeAttribute('autoplay');
            v.src = '';
            return;
        }
        var flipped = false;
        // When video ends, hold last frame then auto-flip to real photo
        v.addEventListener('ended', function() {
            v.currentTime = v.duration;
            v.pause();
            setTimeout(function() {
                flipped = true;
                container.classList.add('flipped');
            }, 600);
        });
        // Each hover toggles between cartoon and real photo
        container.addEventListener('mouseenter', function() {
            flipped = !flipped;
            container.classList.toggle('flipped', flipped);
        });
    })();
    </script>
    <script src="{% static 'portfolio/js/main.js' %}"></script>
    <script type="module" src="{% static 'portfolio/js/nanoparticle.js' %}"></script>
    <script type="module" src="{% static 'portfolio/js/depth-demo.js' %}"></script>
</body>
</html>
