{% extends "portfolio/base.html" %}
{% load static %}

{% block extra_head %}
<style>
/* Accounts layout — simple centered card. Lives next to the other
 * public pages; reuses base.css palette + typography. */
.acc-shell {
    max-width: 440px;
    margin: 0 auto;
    padding: 72px 24px 64px;
    font-family: 'Inter', system-ui, sans-serif;
}
.acc-card {
    background: var(--surface-0, #fafafa);
    border: 1px solid var(--border, #e2e2e4);
    border-radius: 12px;
    padding: 32px 28px 28px;
    box-shadow: 0 2px 8px -2px rgba(0, 0, 0, 0.05);
}
.acc-title {
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-size: 1.75rem; font-weight: 600; margin: 0 0 6px;
    color: var(--text-primary, #1a1a1a);
}
.acc-sub {
    color: var(--text-muted, #6c7086);
    font-size: 0.9rem;
    margin: 0 0 20px;
}
.acc-form { display: flex; flex-direction: column; gap: 14px; }
.acc-field { display: flex; flex-direction: column; gap: 4px; }
.acc-field label { font-size: 0.8rem; font-weight: 600; color: var(--text-primary, #1a1a1a); }
.acc-field .helptext { font-size: 0.72rem; color: var(--text-muted, #6c7086); line-height: 1.4; }
.acc-field input {
    padding: 9px 12px; font-size: 0.92rem; font-family: inherit;
    background: var(--surface-base, #fff);
    border: 1px solid var(--border, #d1d5db);
    border-radius: 6px; color: var(--text-primary, #1a1a1a); outline: none;
}
.acc-field input:focus { border-color: var(--accent, #7287fd); }
.acc-errors { color: #d20f39; font-size: 0.8rem; margin: 0; padding-left: 18px; }
.acc-submit {
    margin-top: 4px;
    padding: 10px 18px; font-size: 0.95rem; font-weight: 600;
    background: var(--accent, #1a1a1a); color: #fff; border: 0;
    border-radius: 6px; cursor: pointer; font-family: inherit;
}
.acc-submit:hover { background: var(--accent-hover, #2d3036); }
.acc-links {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--border, #e2e2e4);
    font-size: 0.85rem; color: var(--text-muted, #6c7086);
    text-align: center;
}
.acc-links a { color: var(--accent, #1a1a1a); text-decoration: none; }
.acc-links a:hover { text-decoration: underline; }
.acc-note {
    background: color-mix(in srgb, var(--accent, #7287fd) 6%, transparent);
    border-left: 3px solid var(--accent, #7287fd);
    padding: 10px 12px; border-radius: 4px;
    font-size: 0.85rem; line-height: 1.5; color: var(--text-primary, #1a1a1a);
    margin: 18px 0 0;
}
</style>
{% endblock %}

{% block content %}
<div class="acc-shell">
    <div class="acc-card">
        {% block acc_content %}{% endblock %}
    </div>
</div>
{% endblock %}
