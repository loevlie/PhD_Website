{% extends "portfolio/base.html" %}
{% load static %}

{% block extra_head %}
<style>
/* Accounts pages — editorial card on a subtle gradient, theme-aware.
 *
 * The palette previously mixed themed and un-themed CSS variables which
 * rendered "Welcome, <user>" invisible in dark mode (light-tinted text
 * on a stuck-light card). This file pins both card and text to the
 * Catppuccin palette variables, which DO flip with the site theme, so
 * the card reads cleanly in both Latte (light) and Mocha (dark). */

.acc-stage {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(32px, 6vw, 80px) 20px;
    /* Subtle mantle → base gradient + a pair of soft radial highlights
     * tinted with the theme accent. Adds a whiff of depth without
     * reading as a "hero". */
    background:
        radial-gradient(1200px 600px at 85% -10%, color-mix(in srgb, var(--ctp-lavender, #7287fd) 10%, transparent), transparent 60%),
        radial-gradient(900px 500px at -10% 100%, color-mix(in srgb, var(--ctp-blue, #1e66f5) 8%, transparent), transparent 55%),
        linear-gradient(180deg, var(--ctp-mantle, #e6e9ef) 0%, var(--ctp-base, #eff1f5) 100%);
}

.acc-shell { width: min(460px, 100%); }

/* Eyebrow link home — tiny typographic anchor above the card. */
.acc-anchor {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 0.72rem; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ctp-subtext0, #6c7086);
    text-decoration: none;
    margin-bottom: 14px;
    padding: 0 4px;
}
.acc-anchor:hover { color: var(--ctp-lavender, #7287fd); }
.acc-anchor-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ctp-lavender, #7287fd);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ctp-lavender, #7287fd) 18%, transparent);
}

.acc-card {
    background: var(--ctp-base, #eff1f5);
    border: 1px solid var(--ctp-surface0, #ccd0da);
    border-radius: 14px;
    padding: 36px 32px 32px;
    box-shadow:
        0 1px 0 0 color-mix(in srgb, var(--ctp-text, #4c4f69) 4%, transparent) inset,
        0 20px 60px -22px color-mix(in srgb, var(--ctp-crust, #11111b) 55%, transparent),
        0 4px 12px -6px rgba(0, 0, 0, 0.15);
}

/* Eyebrow inside the card — small-caps tracked tag matching the blog
 * editorial register (explainer posts, BibTeX card, etc.). */
.acc-eyebrow {
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ctp-lavender, #7287fd);
    margin: 0 0 8px;
    font-weight: 600;
}

.acc-title {
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-size: clamp(1.6rem, 4vw, 2rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
    color: var(--ctp-text, #4c4f69);
}
.acc-title em {
    font-style: italic;
    color: var(--ctp-lavender, #7287fd);
    font-weight: 500;
}

.acc-sub {
    color: var(--ctp-subtext1, #5c5f77);
    font-size: 0.92rem;
    line-height: 1.5;
    margin: 0 0 24px;
    font-family: 'Inter', system-ui, sans-serif;
}

.acc-form { display: flex; flex-direction: column; gap: 16px; font-family: 'Inter', system-ui, sans-serif; }

.acc-field { display: flex; flex-direction: column; gap: 5px; }
.acc-field label {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ctp-text, #4c4f69);
}
.acc-field .helptext {
    font-size: 0.72rem;
    line-height: 1.45;
    color: var(--ctp-subtext0, #6c7086);
}
.acc-field input {
    padding: 10px 13px;
    font-size: 0.94rem;
    font-family: inherit;
    background: var(--ctp-mantle, #e6e9ef);
    border: 1px solid var(--ctp-surface1, #bcc0cc);
    border-radius: 8px;
    color: var(--ctp-text, #4c4f69);
    outline: none;
    transition: border-color 120ms, box-shadow 120ms, background 120ms;
}
.acc-field input::placeholder { color: var(--ctp-subtext0, #6c7086); }
.acc-field input:hover {
    border-color: color-mix(in srgb, var(--ctp-lavender, #7287fd) 50%, var(--ctp-surface1, #bcc0cc));
}
.acc-field input:focus {
    border-color: var(--ctp-lavender, #7287fd);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ctp-lavender, #7287fd) 20%, transparent);
    background: var(--ctp-base, #eff1f5);
}

.acc-errors {
    color: var(--ctp-red, #d20f39);
    font-size: 0.8rem;
    margin: 2px 0 0;
    padding-left: 18px;
    line-height: 1.45;
}

.acc-submit {
    margin-top: 6px;
    padding: 12px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--ctp-text, #4c4f69);
    color: var(--ctp-base, #eff1f5);
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 120ms, transform 80ms;
}
.acc-submit:hover { background: var(--ctp-lavender, #7287fd); }
.acc-submit:active { transform: translateY(1px); }

.acc-divider {
    margin: 22px 0 16px;
    border: 0;
    border-top: 1px solid var(--ctp-surface0, #ccd0da);
}

.acc-links {
    font-size: 0.85rem;
    color: var(--ctp-subtext1, #5c5f77);
    text-align: center;
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.8;
}
.acc-links a {
    color: var(--ctp-lavender, #7287fd);
    text-decoration: none;
    font-weight: 500;
}
.acc-links a:hover { text-decoration: underline; }

.acc-note {
    background: color-mix(in srgb, var(--ctp-lavender, #7287fd) 8%, transparent);
    border-left: 3px solid var(--ctp-lavender, #7287fd);
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 0.86rem;
    line-height: 1.55;
    color: var(--ctp-text, #4c4f69);
    margin: 18px 0 4px;
    font-family: 'Inter', system-ui, sans-serif;
}
.acc-note strong { color: var(--ctp-lavender, #7287fd); font-weight: 600; }
.acc-note code {
    background: var(--ctp-mantle, #e6e9ef);
    padding: 2px 7px; border-radius: 4px;
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 0.86em;
    color: var(--ctp-lavender, #7287fd);
}

/* Post cards on the profile page. */
.acc-post-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.acc-post {
    padding: 14px 16px;
    border: 1px solid var(--ctp-surface0, #ccd0da);
    border-radius: 10px;
    background: var(--ctp-mantle, #e6e9ef);
    transition: border-color 120ms, transform 80ms;
}
.acc-post:hover {
    border-color: var(--ctp-lavender, #7287fd);
    transform: translateY(-1px);
}
.acc-post-title {
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ctp-text, #4c4f69);
    margin: 0 0 4px;
}
.acc-post-meta {
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 0.7rem;
    color: var(--ctp-subtext0, #6c7086);
    margin: 0 0 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.acc-post-actions {
    display: flex; flex-wrap: wrap; gap: 14px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.85rem;
}
.acc-post-actions a {
    color: var(--ctp-lavender, #7287fd);
    text-decoration: none;
    font-weight: 500;
}
.acc-post-actions a.subdued { color: var(--ctp-subtext1, #5c5f77); font-weight: 400; }
.acc-post-actions a:hover { text-decoration: underline; }

/* Session banner — restates "who this browser is" above every profile
 * section so there's no doubt about the active identity. */
.acc-session {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--ctp-mantle, #e6e9ef);
    border: 1px solid var(--ctp-surface0, #ccd0da);
    border-radius: 8px;
    margin-bottom: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.82rem;
}
.acc-session-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ctp-subtext1, #5c5f77);
    flex: none;
}
.acc-session-dot.is-staff {
    background: var(--ctp-lavender, #7287fd);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ctp-lavender, #7287fd) 20%, transparent);
}
.acc-session-label {
    color: var(--ctp-subtext0, #6c7086);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Fira Code', ui-monospace, monospace;
}
.acc-session-name {
    color: var(--ctp-text, #4c4f69);
    font-weight: 600;
    font-family: 'Fira Code', ui-monospace, monospace;
}
.acc-session-role {
    margin-left: auto;
    color: var(--ctp-subtext1, #5c5f77);
    font-size: 0.72rem;
    font-family: 'Fira Code', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

/* Save-success toast — shown after a successful profile save
 * (view redirects with ?saved=1). Subtle green band above the
 * session banner; no auto-dismiss, just disappears on next nav. */
.acc-toast {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: color-mix(in srgb, var(--ctp-green, #40a02b) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--ctp-green, #40a02b) 42%, transparent);
    border-radius: 8px;
    margin-bottom: 14px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.86rem;
    color: var(--ctp-text, #4c4f69);
    animation: acc-toast-in 180ms ease-out;
}
.acc-toast-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ctp-green, #40a02b);
    flex: none;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--ctp-green, #40a02b) 25%, transparent);
}
.acc-toast-text { line-height: 1.4; }
@keyframes acc-toast-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Profile-edit disclosure — lets a collaborator set their
 * display name / avatar / bio / homepage. Shown below the assigned-
 * posts list (or welcome panel on staff). Auto-expanded on first
 * visit (no display_name + no avatar yet). */
.profile-edit {
    margin: 8px 0 0;
    border: 1px solid var(--ctp-surface0, #ccd0da);
    border-radius: 10px;
    background: var(--ctp-mantle, #e6e9ef);
    padding: 10px 14px;
    font-family: 'Inter', system-ui, sans-serif;
}
.profile-edit[open] { padding-bottom: 18px; }
.profile-edit-head {
    cursor: pointer;
    list-style: none;
    display: flex; align-items: baseline; gap: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--ctp-text, #4c4f69);
    padding: 4px 0;
}
.profile-edit-head::-webkit-details-marker { display: none; }
.profile-edit-head::before {
    content: '▸';
    color: var(--ctp-subtext0, #6c7086);
    display: inline-block;
    transition: transform 140ms;
    font-size: 0.72rem;
}
.profile-edit[open] .profile-edit-head::before { transform: rotate(90deg); }
.profile-edit-hint {
    font-weight: 400;
    font-size: 0.72rem;
    color: var(--ctp-subtext0, #a6adc8);
    margin-left: auto;
    text-transform: none;
    letter-spacing: 0;
}

.profile-form { gap: 12px; padding-top: 14px; }
.profile-preview {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: var(--ctp-base, #eff1f5);
    border: 1px solid var(--ctp-surface0, #ccd0da);
    border-radius: 8px;
    margin-bottom: 6px;
}
.profile-preview-avatar {
    width: 46px; height: 46px; border-radius: 50%; object-fit: cover;
    background: var(--ctp-surface1, #bcc0cc);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ctp-base, #eff1f5);
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-weight: 600; font-size: 1.2rem;
    flex: none;
}
.profile-preview-avatar--empty { background: var(--ctp-lavender, #7287fd); }
.profile-preview-name {
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-size: 1rem; font-weight: 600;
    color: var(--ctp-text, #4c4f69);
}
.profile-preview-bio {
    margin-top: 2px;
    font-size: 0.82rem;
    color: var(--ctp-subtext1, #5c5f77);
    font-style: italic;
}
.profile-form input[type="file"] {
    background: var(--ctp-base, #eff1f5);
    border: 1px dashed var(--ctp-surface1, #bcc0cc);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.82rem;
    color: var(--ctp-subtext1, #5c5f77);
    font-family: inherit;
}
.profile-form input[type="file"]:hover { border-color: var(--ctp-lavender, #7287fd); }
</style>
{% endblock %}

{% block content %}
<div class="acc-stage">
    <div class="acc-shell">
        <a class="acc-anchor" href="/">
            <span class="acc-anchor-dot"></span>
            dennisloevlie.com
        </a>
        <div class="acc-card">
            {% block acc_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
